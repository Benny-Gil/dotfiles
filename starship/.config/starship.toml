# ~/.config/starship.toml — prompt config
# https://starship.rs/config/

add_newline = true
command_timeout = 1000

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold yellow"

[python]
symbol = " "
[nodejs]
symbol = " "
[rust]
symbol = " "
[golang]
symbol = " "
