# ~/.tmux.conf — cross-platform tmux config

# Prefix: Ctrl-a (easier than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color + sensible terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc"

# Start indexing at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# General
set -g mouse on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
setw -g mode-keys vi

# Splits keep current path; intuitive bindings
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# Status bar
set -g status-interval 5
set -g status-style "bg=default fg=white"
set -g status-left "#[fg=cyan,bold] #S "
set -g status-left-length 30
set -g status-right "#[fg=yellow]%Y-%m-%d #[fg=green]%H:%M "
set -g window-status-current-style "fg=black,bg=cyan"
